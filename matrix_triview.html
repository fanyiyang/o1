<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tri-View Matrix Cloud</title>
<style>
  :root {
    --bg-1: #05140c;
    --bg-2: #021c12;
    --grid: rgba(0, 255, 140, 0.12);
    --glow: #16ff86;
    --glow-soft: rgba(22, 255, 134, 0.35);
    --panel: rgba(4, 18, 12, 0.72);
    --panel-border: rgba(22, 255, 134, 0.25);
    --text: #e1fff2;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    color: var(--text);
    font-family: "Cascadia Code", "Fira Mono", "Menlo", "Monaco", "Consolas", monospace;
    background:
      radial-gradient(1200px 700px at 70% 10%, rgba(22,255,134,0.12), transparent 60%),
      radial-gradient(900px 700px at 20% 80%, rgba(0,255,160,0.08), transparent 60%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2) 65%);
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.03), rgba(255,255,255,0.03) 1px, transparent 1px, transparent 3px),
      repeating-linear-gradient(90deg, var(--grid), var(--grid) 1px, transparent 1px, transparent 90px);
    mix-blend-mode: screen;
    pointer-events: none;
  }
  canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }
  .hud {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 10px 12px;
    min-width: 240px;
    max-width: 280px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    box-shadow: 0 0 30px rgba(0, 255, 170, 0.15);
    backdrop-filter: blur(6px);
  }
  .hud h1 {
    margin: 0 0 8px;
    font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .hud p {
    margin: 0 0 12px;
    font-size: 10px;
    color: rgba(225, 255, 242, 0.7);
  }
  .controls {
    display: grid;
    gap: 10px;
  }
  .row {
    display: grid;
    grid-template-columns: 88px 1fr 48px;
    gap: 8px;
    align-items: center;
    font-size: 11px;
  }
  .row input[type="range"] {
    width: 100%;
  }
  .row output {
    text-align: right;
    color: var(--glow);
  }
  .chars {
    display: grid;
    gap: 8px;
    grid-template-columns: repeat(3, minmax(52px, 1fr));
  }
  .chars label {
    font-size: 10px;
    color: rgba(225, 255, 242, 0.7);
  }
  .chars input {
    width: 100%;
    margin-top: 4px;
    padding: 4px 6px;
    border-radius: 6px;
    border: 1px solid rgba(22,255,134,0.3);
    background: rgba(0,0,0,0.35);
    color: var(--text);
    font-size: 14px;
    text-transform: uppercase;
    text-align: center;
  }
  .view-buttons {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .view-buttons button {
    background: rgba(0, 0, 0, 0.4);
    color: var(--text);
    border: 1px solid rgba(22,255,134,0.25);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 10px;
    cursor: pointer;
  }
  .view-buttons button.active {
    border-color: var(--glow);
    box-shadow: 0 0 12px rgba(22,255,134,0.3);
  }
  .toggles {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 10px;
  }
  .corner {
    position: fixed;
    right: 24px;
    bottom: 24px;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(22, 255, 134, 0.6);
    text-transform: uppercase;
  }
  .hint {
    position: fixed;
    left: 24px;
    bottom: 24px;
    font-size: 11px;
    color: rgba(225, 255, 242, 0.6);
  }
  @media (max-width: 760px) {
    .hud {
      left: 16px;
      right: 16px;
      top: 16px;
      min-width: 0;
    }
    .corner, .hint {
      left: 16px;
      right: 16px;
      text-align: center;
    }
    .corner { bottom: 16px; }
    .hint { bottom: 44px; }
  }
</style>
</head>
<body>
<canvas id="cloud"></canvas>
<section class="hud">
  <h1>Tri-View Matrix Cloud</h1>
  <p>Three angles, three letters, one hollowed lattice.</p>
  <div class="controls">
    <div class="chars">
      <label>Front (XY)
        <input id="charFront" maxlength="1" value="范">
      </label>
      <label>Side (YZ)
        <input id="charSide" maxlength="1" value="易">
      </label>
      <label>Top (XZ)
        <input id="charTop" maxlength="1" value="扬">
      </label>
    </div>
    <div class="row">
      <label for="grid">Grid</label>
      <input id="grid" type="range" min="20" max="48" step="2" value="36">
      <output id="gridOut">36</output>
    </div>
    <div class="row">
      <label for="thickness">Thickness</label>
      <input id="thickness" type="range" min="1" max="5" step="1" value="2">
      <output id="thicknessOut">2</output>
    </div>
    <div class="row">
      <label for="depth">Depth</label>
      <input id="depth" type="range" min="700" max="2200" step="100" value="1500">
      <output id="depthOut">1500</output>
    </div>
    <div class="row">
      <label for="spin">Spin</label>
      <input id="spin" type="range" min="0" max="60" step="1" value="12">
      <output id="spinOut">12</output>
    </div>
    <div class="row">
      <label for="glow">Glow</label>
      <input id="glow" type="range" min="0.5" max="2.8" step="0.1" value="1.3">
      <output id="glowOut">1.3</output>
    </div>
    <div class="toggles">
      <label><input id="auto" type="checkbox" checked> Auto drift</label>
      <label><input id="strict" type="checkbox" checked> Strict intersect</label>
      <label><input id="trail" type="checkbox" checked> Trails</label>
    </div>
    <div class="view-buttons" id="views">
      <button data-view="free" class="active">Free</button>
      <button data-view="front">Front</button>
      <button data-view="side">Side</button>
      <button data-view="top">Top</button>
    </div>
  </div>
</section>
<div class="hint">Drag to orbit. Scroll to zoom. Click view buttons to lock angles.</div>
<div class="corner">Lattice sealed</div>

<script>
(() => {
  const canvas = document.getElementById('cloud');
  const ctx = canvas.getContext('2d');
  const charFront = document.getElementById('charFront');
  const charSide = document.getElementById('charSide');
  const charTop = document.getElementById('charTop');
  const gridEl = document.getElementById('grid');
  const thicknessEl = document.getElementById('thickness');
  const depthEl = document.getElementById('depth');
  const spinEl = document.getElementById('spin');
  const glowEl = document.getElementById('glow');
  const autoEl = document.getElementById('auto');
  const strictEl = document.getElementById('strict');
  const trailEl = document.getElementById('trail');
  const gridOut = document.getElementById('gridOut');
  const thicknessOut = document.getElementById('thicknessOut');
  const depthOut = document.getElementById('depthOut');
  const spinOut = document.getElementById('spinOut');
  const glowOut = document.getElementById('glowOut');
  const viewButtons = document.getElementById('views');

  let w = 0;
  let h = 0;
  let center = { x: 0, y: 0 };
  let points = [];
  let rotX = -0.55;
  let rotY = 0.4;
  let targetRot = null;
  let drag = false;
  let last = { x: 0, y: 0 };
  let zoom = 1;

  const maskSize = 160;
  const carveScale = 0.7;
  const noiseChance = 0.02;
  const buildMask = (char) => {
    const canvasMask = document.createElement('canvas');
    canvasMask.width = maskSize;
    canvasMask.height = maskSize;
    const c = canvasMask.getContext('2d');
    c.clearRect(0, 0, maskSize, maskSize);
    c.fillStyle = '#fff';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.font = `bold ${maskSize * 0.9}px "Cascadia Code", "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", "Heiti SC", sans-serif`;
    c.fillText(char, maskSize / 2, maskSize / 2);
    return c.getImageData(0, 0, maskSize, maskSize).data;
  };

  const maskHit = (mask, u, v) => {
    const x = Math.max(0, Math.min(maskSize - 1, Math.floor(u * (maskSize - 1))));
    const y = Math.max(0, Math.min(maskSize - 1, Math.floor(v * (maskSize - 1))));
    const idx = (y * maskSize + x) * 4 + 3;
    return mask[idx] > 20;
  };

  const createPoints = () => {
    const grid = parseInt(gridEl.value, 10);
    const thick = parseInt(thicknessEl.value, 10);
    const f = buildMask(charFront.value || 'A');
    const s = buildMask(charSide.value || 'B');
    const t = buildMask(charTop.value || 'C');
    const step = 2 / (grid - 1);
    points = [];

    for (let xi = 0; xi < grid; xi++) {
      for (let yi = 0; yi < grid; yi++) {
        for (let zi = 0; zi < grid; zi++) {
          const x = -1 + xi * step;
          const y = -1 + yi * step;
          const z = -1 + zi * step;
          const uvFront = { u: (x + 1) / 2, v: 1 - (y + 1) / 2 };
          const uvSide = { u: (z + 1) / 2, v: 1 - (y + 1) / 2 };
          const uvTop = { u: (x + 1) / 2, v: 1 - (z + 1) / 2 };

          const inFront = Math.abs(x) <= carveScale && Math.abs(y) <= carveScale;
          const inSide = Math.abs(z) <= carveScale && Math.abs(y) <= carveScale;
          const inTop = Math.abs(x) <= carveScale && Math.abs(z) <= carveScale;
          const hitFront = inFront && maskHit(f, uvFront.u, uvFront.v);
          const hitSide = inSide && maskHit(s, uvSide.u, uvSide.v);
          const hitTop = inTop && maskHit(t, uvTop.u, uvTop.v);
          if (hitFront || hitSide || hitTop) continue;
          if (Math.random() < noiseChance) continue;

          const jitter = (Math.random() - 0.5) * 0.012 * thick;
          points.push({
            x: (x + jitter) * 520,
            y: (y + jitter) * 520,
            z: (z + jitter) * 520
          });
        }
      }
    }
  };

  const rotate = (p, ax, ay) => {
    let { x, y, z } = p;
    const cosY = Math.cos(ay);
    const sinY = Math.sin(ay);
    const cosX = Math.cos(ax);
    const sinX = Math.sin(ax);
    let dx = x * cosY - z * sinY;
    let dz = x * sinY + z * cosY;
    let dy = y * cosX - dz * sinX;
    dz = y * sinX + dz * cosX;
    return { x: dx, y: dy, z: dz };
  };

  const render = () => {
    if (!trailEl.checked) {
      ctx.clearRect(0, 0, w, h);
    } else {
      ctx.fillStyle = 'rgba(2, 14, 9, 0.22)';
      ctx.fillRect(0, 0, w, h);
    }

    const depth = parseInt(depthEl.value, 10);
    const glow = parseFloat(glowEl.value);
    const spin = parseInt(spinEl.value, 10) * 0.0006;

    if (autoEl.checked && !drag) {
      rotY += spin;
      rotX += spin * 0.7;
    }
    if (targetRot) {
      rotX += (targetRot.x - rotX) * 0.08;
      rotY += (targetRot.y - rotY) * 0.08;
    }

    const glowColor = getComputedStyle(document.documentElement).getPropertyValue('--glow').trim();
    const glowSoft = getComputedStyle(document.documentElement).getPropertyValue('--glow-soft').trim();

    for (const p of points) {
      const r = rotate(p, rotX, rotY);
      const z = r.z + depth;
      const scale = zoom;
      const x2 = r.x * scale + center.x;
      const y2 = center.y - r.y * scale;
      const radius = Math.max(0.7, 1.1 * scale * glow);

      if (x2 < -60 || x2 > w + 60 || y2 < -60 || y2 > h + 60) continue;

      ctx.beginPath();
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = glowSoft;
      ctx.arc(x2, y2, radius * 2.4, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = glowColor;
      ctx.arc(x2, y2, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha = 1;

    requestAnimationFrame(render);
  };

  const resize = () => {
    w = canvas.width = window.innerWidth * devicePixelRatio;
    h = canvas.height = window.innerHeight * devicePixelRatio;
    canvas.style.width = `${window.innerWidth}px`;
    canvas.style.height = `${window.innerHeight}px`;
    center = { x: w / 2, y: h / 2 };
  };

  const updateOutputs = () => {
    gridOut.textContent = gridEl.value;
    thicknessOut.textContent = thicknessEl.value;
    depthOut.textContent = depthEl.value;
    spinOut.textContent = spinEl.value;
    glowOut.textContent = glowEl.value;
  };

  const onPointerDown = (event) => {
    drag = true;
    last.x = event.clientX;
    last.y = event.clientY;
  };

  const onPointerMove = (event) => {
    if (!drag) return;
    const dx = event.clientX - last.x;
    const dy = event.clientY - last.y;
    rotY += dx * 0.005;
    rotX -= dy * 0.005;
    last.x = event.clientX;
    last.y = event.clientY;
  };

  const onPointerUp = () => {
    drag = false;
  };

  const onWheel = (event) => {
    const delta = Math.sign(event.deltaY);
    zoom += delta * -0.05;
    zoom = Math.max(0.5, Math.min(1.8, zoom));
  };

  const setView = (view) => {
    viewButtons.querySelectorAll('button').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.view === view);
    });
    if (view === 'front') targetRot = { x: 0, y: 0 };
    if (view === 'side') targetRot = { x: 0, y: Math.PI / 2 };
    if (view === 'top') targetRot = { x: -Math.PI / 2, y: 0 };
    if (view === 'free') targetRot = null;
  };

  [gridEl, thicknessEl].forEach((el) => el.addEventListener('input', () => {
    updateOutputs();
    createPoints();
  }));
  [depthEl, spinEl, glowEl].forEach((el) => el.addEventListener('input', updateOutputs));
  [charFront, charSide, charTop, strictEl].forEach((el) => el.addEventListener('input', createPoints));

  viewButtons.addEventListener('click', (event) => {
    const button = event.target.closest('button');
    if (!button) return;
    setView(button.dataset.view);
  });

  window.addEventListener('resize', resize);
  canvas.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);
  window.addEventListener('wheel', onWheel, { passive: true });

  resize();
  createPoints();
  updateOutputs();
  ctx.fillStyle = 'rgba(2, 14, 9, 1)';
  ctx.fillRect(0, 0, w, h);
  render();
})();
</script>
</body>
</html>
